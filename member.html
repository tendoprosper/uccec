<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register · UCCEC</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 30px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at top left, rgba(200,16,46,0.15), transparent 40%),
                  radial-gradient(circle at bottom right, rgba(255,123,0,0.10), transparent 35%),
                  #0a0a0a;
    }

    .auth-card {
      width: 100%;
      max-width: 500px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 32px;
      padding: 45px 35px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
      animation: fadeUp 0.6s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-card .logo {
      text-align: center;
      margin-bottom: 16px;
    }

    .auth-card .logo img {
      height: 65px;
      width: auto;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    }

    .auth-card h1 {
      color: white;
      font-size: 30px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 4px;
    }

    .auth-card .sub {
      color: #aaa;
      text-align: center;
      font-size: 15px;
      margin-bottom: 24px;
    }

    .auth-card .sub a {
      color: #ff8c00;
      text-decoration: none;
    }

    .auth-card .sub a:hover {
      text-decoration: underline;
    }

    .auth-card .form-group {
      margin-bottom: 16px;
    }

    .auth-card .form-group label {
      display: block;
      color: #ccc;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .auth-card .form-group input,
    .auth-card .form-group select {
      width: 100%;
      padding: 14px 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: white;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }

    .auth-card .form-group input:focus,
    .auth-card .form-group select:focus {
      border-color: #ff8c00;
      background: rgba(255,255,255,0.06);
    }

    .auth-card .form-group select option {
      background: #1a1a1a;
      color: white;
    }

    .auth-card .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .auth-card .form-group .password-wrapper {
      position: relative;
    }

    .auth-card .form-group .password-wrapper input {
      padding-right: 50px;
    }

    .auth-card .form-group .password-wrapper .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 18px;
    }

    .auth-card .form-group .password-wrapper .toggle-password:hover {
      color: white;
    }

    .auth-card .terms {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin: 16px 0 22px;
      color: #aaa;
      font-size: 14px;
      line-height: 1.6;
    }

    .auth-card .terms input {
      accent-color: #ff8c00;
      width: 20px;
      height: 20px;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .auth-card .terms a {
      color: #ff8c00;
      text-decoration: none;
    }

    .auth-card .terms a:hover {
      text-decoration: underline;
    }

    .btn-register {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #c8102e, #ff7b00);
      color: white;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: .3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-register:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(200,16,46,0.3);
    }

    .auth-card .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: #555;
      font-size: 13px;
    }

    .auth-card .divider::before,
    .auth-card .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    .auth-card .login-link {
      text-align: center;
      margin-top: 20px;
      color: #888;
      font-size: 14px;
    }

    .auth-card .login-link a {
      color: #ff8c00;
      text-decoration: none;
      font-weight: 600;
    }

    .auth-card .login-link a:hover {
      text-decoration: underline;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 16px;
      transition: .2s;
    }

    .back-btn:hover {
      color: white;
    }

    .back-btn i {
      font-size: 16px;
    }

    @media (max-width: 500px) {
      .auth-card { padding: 30px 20px; }
      .auth-card h1 { font-size: 24px; }
      .auth-card .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="auth-card">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back Home</a>

    <div class="logo">
      <img src="https://uccec.com/wp-content/uploads/2025/08/logo_uccec.png" alt="UCCEC Logo">
    </div>

    <h1>Create Account</h1>
    <p class="sub">Join the UCCEC community today</p>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" placeholder="John" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" placeholder="Doe" required>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="+256 700 000 000" required>
      </div>

      <div class="form-group">
        <label>Membership Category</label>
        <select required>
          <option value="">Select category</option>
          <option value="individual">Individual – UGX 50,000</option>
          <option value="corporate">Corporate – UGX 250,000</option>
          <option value="student">Student – UGX 25,000</option>
        </select>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="regPasswordInput" placeholder="Create a password" required>
          <button type="button" class="toggle-password" onclick="toggleRegPassword()">
            <i class="fas fa-eye" id="regPasswordIcon"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm your password" required>
      </div>

      <div class="terms">
        <input type="checkbox" id="termsCheck" required>
        <label for="termsCheck">
          I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>. I understand that I will be charged a one-time registration fee based on my selected membership category.
        </label>
      </div>

      <button type="submit" class="btn-register">
        <i class="fas fa-user-plus"></i> Register Now
      </button>
    </form>

    <div class="divider">or</div>

    <div class="login-link">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>

  <script>
    // ===== TOGGLE PASSWORD =====
    function toggleRegPassword() {
      const input = document.getElementById('regPasswordInput');
      const icon = document.getElementById('regPasswordIcon');
      
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    // ===== HANDLE REGISTER =====
    function handleRegister(e) {
      e.preventDefault();
      
      const category = document.querySelector('select').value;
      const categoryLabel = category === 'individual' ? 'Individual – UGX 50,000' :
                           category === 'corporate' ? 'Corporate – UGX 250,000' :
                           category === 'student' ? 'Student – UGX 25,000' : 'Not selected';
      
      alert('✅ Registration successful!\n\nWelcome to UCCEC!\n\nMembership Category: ' + categoryLabel + '\n\nYou will receive a confirmation email shortly.');
      
      // Redirect to login or home
      // window.location.href = 'login.html';
    }

    console.log('✅ Register page loaded');
  </script>

</body>
</html>
