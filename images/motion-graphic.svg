<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <style>
      @keyframes orbit1 { 
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes orbit2 { 
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); }
      }
      @keyframes pulse-grow {
        0%, 100% { r: 8; opacity: 1; }
        50% { r: 12; opacity: 0.5; }
      }
      @keyframes color-shift {
        0% { fill: #7fb069; }
        50% { fill: #c8e6c9; }
        100% { fill: #7fb069; }
      }
      .orbit { animation: orbit1 20s linear infinite; transform-origin: 200px 200px; }
      .orbit-reverse { animation: orbit2 25s linear infinite; transform-origin: 200px 200px; }
      .pulse-dot { animation: pulse-grow 2s ease-in-out infinite; }
      .color-pulse { animation: color-shift 3s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#7fb069" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#a8d5a8" stroke-width="1.5" opacity="0.2"/>
  <circle cx="200" cy="200" r="90" fill="none" stroke="#c8e6c9" stroke-width="1" opacity="0.15"/>
  
  <!-- Center circle -->
  <circle cx="200" cy="200" r="25" fill="#2d5016" class="color-pulse"/>
  <circle cx="200" cy="200" r="20" fill="#7fb069" opacity="0.8"/>
  
  <!-- Orbiting elements - Inner ring -->
  <g class="orbit">
    <circle cx="200" cy="80" r="10" fill="#7fb069"/>
    <circle cx="200" cy="80" r="8" fill="#c8e6c9" class="pulse-dot"/>
  </g>
  
  <g class="orbit" style="animation-delay: 6.67s;">
    <circle cx="320" cy="200" r="10" fill="#a8d5a8"/>
    <circle cx="320" cy="200" r="8" fill="#c8e6c9" class="pulse-dot"/>
  </g>
  
  <g class="orbit" style="animation-delay: 13.34s;">
    <circle cx="200" cy="320" r="10" fill="#7fb069"/>
    <circle cx="200" cy="320" r="8" fill="#c8e6c9" class="pulse-dot"/>
  </g>
  
  <g class="orbit" style="animation-delay: 20s;">
    <circle cx="80" cy="200" r="10" fill="#a8d5a8"/>
    <circle cx="80" cy="200" r="8" fill="#c8e6c9" class="pulse-dot"/>
  </g>
  
  <!-- Orbiting elements - Outer ring -->
  <g class="orbit-reverse">
    <polygon points="200,40 210,60 190,60" fill="#FFD700" opacity="0.8"/>
  </g>
  
  <g class="orbit-reverse" style="animation-delay: 6.25s;">
    <polygon points="360,200 340,210 340,190" fill="#FFD700" opacity="0.8"/>
  </g>
  
  <g class="orbit-reverse" style="animation-delay: 12.5s;">
    <polygon points="200,360 190,340 210,340" fill="#FFD700" opacity="0.8"/>
  </g>
  
  <g class="orbit-reverse" style="animation-delay: 18.75s;">
    <polygon points="40,200 60,190 60,210" fill="#FFD700" opacity="0.8"/>
  </g>
  
  <!-- Connecting lines (optional decorative) -->
  <line x1="200" y1="200" x2="200" y2="80" stroke="#7fb069" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="200" x2="320" y2="200" stroke="#a8d5a8" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="200" x2="200" y2="320" stroke="#7fb069" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="200" x2="80" y2="200" stroke="#a8d5a8" stroke-width="1" opacity="0.2"/>
</svg>