<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7fb069;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a7c2c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d5a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7fb069;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Soil -->
  <ellipse cx="100" cy="280" rx="80" ry="20" fill="#4a7c2c" opacity="0.6"/>
  <rect x="20" y="280" width="160" height="20" fill="#2d5016" opacity="0.4"/>
  
  <!-- Main stem -->
  <path d="M 100 280 Q 95 240 100 180 Q 102 120 100 60" stroke="url(#stemGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Left branch -->
  <path d="M 95 200 Q 60 190 40 210" stroke="url(#stemGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Right branch -->
  <path d="M 105 150 Q 140 130 160 120" stroke="url(#stemGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Top leaves -->
  <g>
    <!-- Left leaf 1 -->
    <ellipse cx="35" cy="210" rx="25" ry="40" fill="url(#leafGrad)" transform="rotate(-60 35 210)" opacity="0.9"/>
    <path d="M 32 190 Q 35 205 38 225" stroke="#4a7c2c" stroke-width="1" fill="none" opacity="0.5"/>
    
    <!-- Left leaf 2 -->
    <ellipse cx="55" cy="200" rx="22" ry="35" fill="url(#leafGrad)" transform="rotate(-40 55 200)" opacity="0.85"/>
    <path d="M 52 180 Q 55 195 58 215" stroke="#4a7c2c" stroke-width="1" fill="none" opacity="0.5"/>
    
    <!-- Right leaf 1 -->
    <ellipse cx="155" cy="120" rx="28" ry="42" fill="url(#leafGrad)" transform="rotate(50 155 120)" opacity="0.9"/>
    <path d="M 152 95 Q 155 110 158 135" stroke="#4a7c2c" stroke-width="1" fill="none" opacity="0.5"/>
    
    <!-- Right leaf 2 -->
    <ellipse cx="130" cy="145" rx="24" ry="38" fill="url(#leafGrad)" transform="rotate(35 130 145)" opacity="0.85"/>
    <path d="M 127 120 Q 130 135 133 160" stroke="#4a7c2c" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
  
  <!-- Middle section leaves -->
  <g>
    <!-- Left middle leaf -->
    <ellipse cx="75" cy="160" rx="20" ry="32" fill="url(#leafGrad)" transform="rotate(-50 75 160)" opacity="0.88"/>
    
    <!-- Right middle leaf -->
    <ellipse cx="125" cy="100" rx="22" ry="34" fill="url(#leafGrad)" transform="rotate(45 125 100)" opacity="0.88"/>
  </g>
  
  <!-- Top leaves around stem -->
  <g>
    <!-- Leaf pair at top -->
    <ellipse cx="80" cy="70" rx="18" ry="30" fill="url(#leafGrad)" transform="rotate(-25 80 70)" opacity="0.9"/>
    <ellipse cx="120" cy="55" rx="18" ry="30" fill="url(#leafGrad)" transform="rotate(25 120 55)" opacity="0.9"/>
    
    <!-- Single top leaf -->
    <ellipse cx="100" cy="20" rx="15" ry="25" fill="#a8d5a8" transform="rotate(0 100 20)" opacity="0.95"/>
  </g>
  
  <!-- Decorative water droplet -->
  <g opacity="0.6">
    <ellipse cx="110" cy="120" rx="4" ry="6" fill="#c8e6c9"/>
    <circle cx="110" cy="118" r="2" fill="#ffffff"/>
  </g>
</svg>