<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c2c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7fb069;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bg2)"/>
  
  <!-- Plant Growth Cycle -->
  <g transform="translate(150, 150)">
    <!-- Stage 1: Seed -->
    <circle cx="-70" cy="-20" r="20" fill="#8B7355" opacity="0.8"/>
    <text x="-70" y="-50" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Seed</text>
    
    <!-- Stage 2: Sprout -->
    <ellipse cx="-20" cy="-30" rx="15" ry="35" fill="#7fb069"/>
    <line x1="-20" y1="5" x2="-20" y2="15" stroke="#4a7c2c" stroke-width="3"/>
    <text x="-20" y="-50" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Sprout</text>
    
    <!-- Stage 3: Young Plant -->
    <ellipse cx="35" cy="-20" rx="20" ry="40" fill="#7fb069"/>
    <ellipse cx="20" cy="-35" rx="12" ry="25" fill="#7fb069" transform="rotate(-35 20 -35)"/>
    <ellipse cx="50" cy="-30" rx="12" ry="25" fill="#7fb069" transform="rotate(35 50 -30)"/>
    <line x1="35" y1="20" x2="35" y2="30" stroke="#4a7c2c" stroke-width="4"/>
    <text x="35" y="-50" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Growth</text>
    
    <!-- Stage 4: Mature Plant -->
    <ellipse cx="85" cy="-15" rx="25" ry="45" fill="#7fb069"/>
    <ellipse cx="65" cy="-35" rx="15" ry="28" fill="#7fb069" transform="rotate(-30 65 -35)"/>
    <ellipse cx="105" cy="-30" rx="15" ry="28" fill="#7fb069" transform="rotate(30 105 -30)"/>
    <ellipse cx="75" cy="-50" rx="12" ry="22" fill="#7fb069" transform="rotate(-20 75 -50)"/>
    <ellipse cx="95" cy="-55" rx="12" ry="22" fill="#7fb069" transform="rotate(20 95 -55)"/>
    <circle cx="85" cy="-65" r="8" fill="#FFB6C1" opacity="0.9"/>
    <line x1="85" y1="30" x2="85" y2="40" stroke="#4a7c2c" stroke-width="5"/>
    <text x="85" y="-50" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Mature</text>
    
    <!-- Arrows between stages -->
    <path d="M -50 -20 L -40 -20" stroke="#ffffff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M 0 -20 L 15 -20" stroke="#ffffff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M 55 -15 L 60 -15" stroke="#ffffff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ffffff" />
    </marker>
  </defs>
</svg>