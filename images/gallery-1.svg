<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5016;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a7c2c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bg1)"/>
  
  <!-- Sustainable Farming Icon -->
  <g transform="translate(150, 150)">
    <!-- Sun -->
    <circle cx="-60" cy="-60" r="25" fill="#FFD700" opacity="0.9"/>
    <g stroke="#FFD700" stroke-width="3" opacity="0.7">
      <line x1="-60" y1="-95" x2="-60" y2="-110"/>
      <line x1="-60" y1="-25" x2="-60" y2="-10"/>
      <line x1="-95" y1="-60" x2="-110" y2="-60"/>
      <line x1="-25" y1="-60" x2="-10" y2="-60"/>
    </g>
    
    <!-- Plants -->
    <g fill="#7fb069">
      <!-- Left plant -->
      <ellipse cx="-50" cy="30" rx="20" ry="25"/>
      <ellipse cx="-60" cy="15" rx="15" ry="20" transform="rotate(-35 -60 15)"/>
      <ellipse cx="-40" cy="15" rx="15" ry="20" transform="rotate(35 -40 15)"/>
      <rect x="-48" y="30" width="4" height="20" fill="#4a7c2c"/>
      
      <!-- Center plant -->
      <ellipse cx="0" cy="40" rx="25" ry="30"/>
      <ellipse cx="-15" cy="20" rx="18" ry="25" transform="rotate(-40 -15 20)"/>
      <ellipse cx="15" cy="20" rx="18" ry="25" transform="rotate(40 15 20)"/>
      <rect x="-2" y="40" width="5" height="25" fill="#4a7c2c"/>
      
      <!-- Right plant -->
      <ellipse cx="50" cy="35" rx="22" ry="27"/>
      <ellipse cx="35" cy="12" rx="16" ry="22" transform="rotate(-30 35 12)"/>
      <ellipse cx="65" cy="12" rx="16" ry="22" transform="rotate(30 65 12)"/>
      <rect x="48" y="35" width="4" height="22" fill="#4a7c2c"/>
    </g>
    
    <!-- Soil -->
    <rect x="-80" y="60" width="160" height="30" fill="#2d5016" opacity="0.7"/>
    <ellipse cx="0" cy="60" rx="80" ry="8" fill="#4a7c2c" opacity="0.6"/>
  </g>
</svg>