<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5016;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a7c2c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bg4)"/>
  
  <!-- Global Market/Globe -->
  <g transform="translate(150, 150)">
    <!-- Globe -->
    <circle cx="0" cy="0" r="50" fill="#c8e6c9" stroke="#7fb069" stroke-width="2"/>
    
    <!-- Continents (simplified) -->
    <!-- Africa -->
    <path d="M -15 -25 L -10 -20 L -5 -25 L -8 -15 L -2 -10 L -8 -5 L -15 0 L -20 -10 Z" fill="#7fb069" opacity="0.8"/>
    
    <!-- Europe -->
    <path d="M 5 -35 L 15 -30 L 18 -35 L 20 -25 L 12 -20 Z" fill="#7fb069" opacity="0.8"/>
    
    <!-- Americas -->
    <ellipse cx="-35" cy="-10" rx="8" ry="15" fill="#7fb069" opacity="0.8"/>
    <ellipse cx="-38" cy="20" rx="6" ry="12" fill="#7fb069" opacity="0.7"/>
    
    <!-- Asia -->
    <path d="M 20 -10 L 35 -15 L 40 0 L 30 10 L 15 5 Z" fill="#7fb069" opacity="0.8"/>
    
    <!-- Trading arrows -->
    <g stroke="#FFD700" stroke-width="2" fill="none">
      <path d="M -65 -20 Q -80 -30 -90 -40" marker-end="url(#arrowhead2)"/>
      <path d="M 65 20 Q 80 30 90 40" marker-end="url(#arrowhead2)"/>
      <path d="M -50 50 Q 0 70 50 50" marker-end="url(#arrowhead2)"/>
    </g>
    
    <!-- Ships/Transport -->
    <g fill="#FFD700" opacity="0.7">
      <polygon points="-85,-35 -75,-30 -75,-40" />
      <polygon points="85,35 95,40 95,30" />
    </g>
  </g>
  
  <defs>
    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FFD700" />
    </marker>
  </defs>
</svg>