<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7fb069;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a7c2c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGrad)" opacity="0.95"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#c8e6c9" stroke-width="2"/>
  
  <!-- Central leaf -->
  <ellipse cx="100" cy="80" rx="25" ry="40" fill="#c8e6c9" opacity="0.9"/>
  <path d="M 88 50 Q 100 80 112 110" stroke="#4a7c2c" stroke-width="2" fill="none"/>
  
  <!-- Left leaf -->
  <ellipse cx="70" cy="100" rx="20" ry="35" fill="#c8e6c9" opacity="0.8" transform="rotate(-45 70 100)"/>
  
  <!-- Right leaf -->
  <ellipse cx="130" cy="100" rx="20" ry="35" fill="#c8e6c9" opacity="0.8" transform="rotate(45 130 100)"/>
  
  <!-- Bottom leaf -->
  <ellipse cx="100" cy="130" rx="22" ry="30" fill="#a8d5a8" opacity="0.85"/>
  
  <!-- Letter U in the middle -->
  <text x="100" y="165" text-anchor="middle" fill="#2d5016" font-size="28" font-weight="bold" font-family="Arial">U</text>
</svg>