<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7fb069;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5016;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bg3)"/>
  
  <!-- Green Community/People -->
  <g transform="translate(150, 150)">
    <!-- People circles -->
    <circle cx="-50" cy="-30" r="20" fill="#ffffff" opacity="0.9"/>
    <circle cx="-50" cy="-30" r="15" fill="#c8e6c9"/>
    
    <circle cx="0" cy="-40" r="22" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="-40" r="17" fill="#c8e6c9"/>
    
    <circle cx="50" cy="-30" r="20" fill="#ffffff" opacity="0.9"/>
    <circle cx="50" cy="-30" r="15" fill="#c8e6c9"/>
    
    <!-- Bodies -->
    <rect x="-60" y="-5" width="20" height="30" rx="5" fill="#c8e6c9"/>
    <rect x="-10" y="-15" width="20" height="40" rx="5" fill="#c8e6c9"/>
    <rect x="40" y="-5" width="20" height="30" rx="5" fill="#c8e6c9"/>
    
    <!-- Hands with plants -->
    <line x1="-50" y1="25" x2="-70" y2="45" stroke="#c8e6c9" stroke-width="3"/>
    <line x1="-30" y1="25" x2="-10" y2="45" stroke="#c8e6c9" stroke-width="3"/>
    
    <line x1="0" y1="25" x2="-20" y2="45" stroke="#c8e6c9" stroke-width="3"/>
    <line x1="20" y1="25" x2="40" y2="45" stroke="#c8e6c9" stroke-width="3"/>
    
    <line x1="50" y1="25" x2="30" y2="45" stroke="#c8e6c9" stroke-width="3"/>
    <line x1="70" y1="25" x2="90" y2="45" stroke="#c8e6c9" stroke-width="3"/>
    
    <!-- Small plants in hands -->
    <ellipse cx="-70" cy="50" rx="12" ry="15" fill="#7fb069"/>
    <ellipse cx="-75" cy="40" rx="8" ry="12" fill="#7fb069" transform="rotate(-25 -75 40)"/>
    
    <ellipse cx="-10" cy="50" rx="12" ry="15" fill="#7fb069"/>
    <ellipse cx="-5" cy="40" rx="8" ry="12" fill="#7fb069" transform="rotate(-25 -5 40)"/>
    
    <ellipse cx="40" cy="50" rx="12" ry="15" fill="#7fb069"/>
    <ellipse cx="45" cy="40" rx="8" ry="12" fill="#7fb069" transform="rotate(25 45 40)"/>
    
    <ellipse cx="90" cy="50" rx="12" ry="15" fill="#7fb069"/>
    <ellipse cx="95" cy="40" rx="8" ry="12" fill="#7fb069" transform="rotate(25 95 40)"/>
    
    <!-- Heart symbol -->
    <path d="M 0 -80 Q -15 -95 -25 -85 Q -35 -75 0 -50 Q 35 -75 25 -85 Q 15 -95 0 -80" fill="#ff6b9d" opacity="0.8"/>
  </g>
</svg>