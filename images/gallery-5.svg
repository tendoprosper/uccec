<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c2c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7fb069;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bg5)"/>
  
  <!-- Organic Badge -->
  <g transform="translate(150, 150)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#c8e6c9" stroke-width="4"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#a8d5a8" stroke-width="2"/>
    
    <!-- Leaf decoration -->
    <ellipse cx="-45" cy="-45" rx="15" ry="25" fill="#c8e6c9" transform="rotate(-45 -45 -45)"/>
    <ellipse cx="45" cy="-45" rx="15" ry="25" fill="#c8e6c9" transform="rotate(45 45 -45)"/>
    <ellipse cx="-50" cy="40" rx="15" ry="25" fill="#c8e6c9" transform="rotate(-135 -50 40)"/>
    <ellipse cx="50" cy="40" rx="15" ry="25" fill="#c8e6c9" transform="rotate(135 50 40)"/>
    
    <!-- Central leaf -->
    <ellipse cx="0" cy="-20" rx="20" ry="35" fill="#7fb069"/>
    <path d="M -8 -35 Q 0 -20 8 -5" stroke="#4a7c2c" stroke-width="1.5" fill="none"/>
    
    <!-- Text circle -->
    <text x="0" y="15" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="bold" font-family="Arial">ORGANIC</text>
    
    <!-- Decorative elements -->
    <circle cx="-55" cy="0" r="4" fill="#FFD700" opacity="0.8"/>
    <circle cx="55" cy="0" r="4" fill="#FFD700" opacity="0.8"/>
    <circle cx="0" cy="-60" r="4" fill="#FFD700" opacity="0.8"/>
    <circle cx="0" cy="65" r="4" fill="#FFD700" opacity="0.8"/>
  </g>
</svg>